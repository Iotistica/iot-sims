name: Update BACnet Vendor Database

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape BTL Product Database
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch latest so we can rebase before push
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run BTL scraper
        id: scrape
        run: |
          python bacnet-simulator/scripts/scrape-btl.py \
            --output bacnet-simulator/bacnet-vendors.json
        env:
          PYTHONUNBUFFERED: "1"

      - name: Show result summary
        if: always()
        run: |
          if [ -f bacnet-simulator/bacnet-vendors.json ]; then
            VENDORS=$(jq '.vendors | length' bacnet-simulator/bacnet-vendors.json)
            PRODUCTS=$(jq '[.vendors[].models | length] | add' bacnet-simulator/bacnet-vendors.json)
            UPDATED=$(jq -r '.updated' bacnet-simulator/bacnet-vendors.json)
            echo "## BTL Scrape Result" >> $GITHUB_STEP_SUMMARY
            echo "- **Vendors:** $VENDORS" >> $GITHUB_STEP_SUMMARY
            echo "- **Products:** $PRODUCTS" >> $GITHUB_STEP_SUMMARY
            echo "- **Updated:** $UPDATED" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit updated vendor data
        if: steps.scrape.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bacnet-simulator/bacnet-vendors.json
          if git diff --staged --quiet; then
            echo "No changes to vendor data"
          else
            VENDORS=$(jq '.vendors | length' bacnet-simulator/bacnet-vendors.json)
            PRODUCTS=$(jq '[.vendors[].models | length] | add' bacnet-simulator/bacnet-vendors.json)
            git commit -m "chore: update BACnet vendor database ($VENDORS vendors, $PRODUCTS products) [skip ci]"
            # Rebase on top of any commits pushed since checkout, then push
            git pull --rebase origin main
            git push origin main
          fi
